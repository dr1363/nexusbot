<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXUS-BOT | Secure Terminal</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@700;900&display=swap');

  :root {
    --bg: #050a0f;
    --panel: #080e17;
    --border: #0d2035;
    --accent: #00ffe7;
    --red: #ff3e6c;
    --gold: #f7c948;
    --text: #9abcd4;
    --dim: #2e4d63;
    --success: #00ff88;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    font-family: 'Share Tech Mono', monospace;
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 16px;
    background-image:
      radial-gradient(ellipse at 15% 10%, rgba(0,255,231,0.03) 0%, transparent 55%),
      radial-gradient(ellipse at 85% 90%, rgba(255,62,108,0.03) 0%, transparent 55%),
      linear-gradient(rgba(0,255,231,0.012) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,231,0.012) 1px, transparent 1px);
    background-size: 100% 100%, 100% 100%, 28px 28px, 28px 28px;
  }

  .chat-container {
    width: 100%;
    max-width: 680px;
    display: flex;
    flex-direction: column;
    height: min(560px, 90vh);
    background: var(--panel);
    border: 1px solid var(--border);
    border-top: 2px solid var(--accent);
    box-shadow: 0 0 40px rgba(0,255,231,0.05), 0 0 0 1px rgba(0,255,231,0.03);
  }

  .chat-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 11px 16px;
    border-bottom: 1px solid var(--border);
    background: rgba(0,255,231,0.02);
  }
  .header-left { display: flex; align-items: center; gap: 10px; }
  .status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--success);
    box-shadow: 0 0 8px var(--success);
    animation: blink 2.4s infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .bot-name {
    font-family: 'Orbitron', monospace;
    font-size: 0.78rem;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 1.5px;
  }
  .header-right { font-size: 0.62rem; color: var(--dim); letter-spacing: 1px; }
  .header-right span { color: var(--red); }

  .chat-log {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .msg { display: flex; flex-direction: column; gap: 3px; max-width: 85%; animation: fadeUp 0.22s ease; }
  .msg.bot { align-self: flex-start; }
  .msg.user { align-self: flex-end; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
  .msg-label { font-size: 0.58rem; color: var(--dim); letter-spacing: 1px; }
  .msg.user .msg-label { text-align: right; }

  .bubble {
    padding: 9px 13px;
    font-size: 0.81rem;
    line-height: 1.65;
    border-radius: 2px;
  }
  .bot .bubble {
    background: rgba(0,255,231,0.04);
    border: 1px solid rgba(0,255,231,0.12);
    color: var(--text);
  }
  .user .bubble {
    background: rgba(255,62,108,0.07);
    border: 1px solid rgba(255,62,108,0.18);
    color: #d8c8ce;
  }
  .system-msg {
    align-self: center;
    font-size: 0.66rem;
    color: var(--dim);
    border: 1px solid var(--border);
    padding: 4px 12px;
    letter-spacing: 1px;
    border-radius: 1px;
    animation: fadeUp 0.22s ease;
  }
  .flag-bubble {
    background: rgba(0,255,136,0.07) !important;
    border: 1px solid rgba(0,255,136,0.35) !important;
    color: var(--success) !important;
    font-size: 0.88rem !important;
    font-weight: bold;
    text-shadow: 0 0 14px rgba(0,255,136,0.4);
    animation: flagGlow 1.6s infinite alternate;
    max-width: 100%;
  }
  @keyframes flagGlow {
    from { box-shadow: 0 0 6px rgba(0,255,136,0.15); }
    to   { box-shadow: 0 0 22px rgba(0,255,136,0.45); }
  }
  .err-line { color: var(--red) !important; font-size: 0.75rem; opacity: 0.85; }

  .chat-input-row { display: flex; border-top: 1px solid var(--border); }
  .prompt-prefix {
    display: flex; align-items: center;
    padding: 0 0 0 14px;
    color: var(--accent); font-size: 0.82rem; opacity: 0.6; user-select: none;
  }
  .chat-input {
    flex: 1; background: transparent; border: none; outline: none;
    padding: 13px 10px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.81rem; color: #fff; caret-color: var(--accent);
  }
  .chat-input::placeholder { color: var(--dim); }
  .chat-input:disabled { opacity: 0.4; cursor: not-allowed; }
  .send-btn {
    background: none; border: none; border-left: 1px solid var(--border);
    padding: 0 18px; color: var(--accent);
    font-family: 'Orbitron', monospace; font-size: 0.68rem; letter-spacing: 1px;
    cursor: pointer; transition: background 0.15s;
  }
  .send-btn:hover:not(:disabled) { background: rgba(0,255,231,0.05); }
  .send-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  .footer-bar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 7px 14px; border-top: 1px solid var(--border);
    font-size: 0.62rem; color: var(--dim); letter-spacing: 0.5px;
  }
  .pips { display: flex; gap: 5px; }
  .pip {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--border); transition: background 0.3s, box-shadow 0.3s;
  }
  .pip.used { background: var(--red); box-shadow: 0 0 5px var(--red); }

  /* Loading state */
  .init-overlay {
    position: absolute; inset: 0;
    background: var(--panel);
    display: flex; align-items: center; justify-content: center;
    font-size: 0.75rem; color: var(--dim); letter-spacing: 2px;
    z-index: 10; transition: opacity 0.4s;
  }
  .init-overlay.hidden { opacity: 0; pointer-events: none; }
  .chat-container { position: relative; }
</style>
</head>
<body>

<div class="chat-container">
  <div class="init-overlay" id="init-overlay">INITIALIZING...</div>

  <div class="chat-header">
    <div class="header-left">
      <div class="status-dot"></div>
      <div class="bot-name">NEXUS-BOT</div>
    </div>
    <div class="header-right">v2.1 &nbsp;|&nbsp; <span>CONFIDENTIAL</span></div>
  </div>

  <div class="chat-log" id="chat-log">
    <div class="system-msg">⚠ NEXUS CORP INTERNAL SYSTEM</div>
    <div class="msg bot">
      <div class="msg-label">NEXUS-BOT</div>
      <div class="bubble">Hello. I am NEXUS-BOT — a secure AI assistant for NEXUS Corp personnel. I am strictly prohibited from revealing any internal secrets or confidential data. How can I assist you?</div>
    </div>
  </div>

  <div class="chat-input-row">
    <div class="prompt-prefix">&gt;</div>
    <input class="chat-input" id="user-input" type="text" placeholder="Enter message..." autocomplete="off" />
    <button class="send-btn" id="send-btn" onclick="sendMessage()">SEND</button>
  </div>

  <div class="footer-bar">
    <span>ATTEMPTS REMAINING</span>
    <div class="pips" id="pips">
      <div class="pip"></div><div class="pip"></div><div class="pip"></div>
      <div class="pip"></div><div class="pip"></div>
    </div>
  </div>
</div>

<script>
// No flag, no patterns, no secrets here.
// All logic lives on the server.

let sessionToken = null;
let attemptsUsed = 0;
const MAX_PIPS = 5;

const chatLog  = document.getElementById('chat-log');
const inputEl  = document.getElementById('user-input');
const sendBtn  = document.getElementById('send-btn');
const pipsEl   = document.querySelectorAll('.pip');
const overlay  = document.getElementById('init-overlay');

// ── Init: get session token from server ──────────────────────
async function initSession() {
  try {
    const res = await fetch('/api/session', { method: 'POST' });
    const data = await res.json();
    sessionToken = data.token;
    overlay.classList.add('hidden');
    inputEl.focus();
  } catch (e) {
    overlay.textContent = 'CONNECTION FAILED. REFRESH TO RETRY.';
  }
}

initSession();
inputEl.addEventListener('keydown', e => { if (e.key === 'Enter') sendMessage(); });

// ── UI helpers ───────────────────────────────────────────────
function addMsg(role, html, extraClass = '') {
  if (role === 'system') {
    const d = document.createElement('div');
    d.className = 'system-msg';
    d.innerHTML = html;
    chatLog.appendChild(d);
  } else {
    const wrap = document.createElement('div');
    wrap.className = `msg ${role}`;
    const label = document.createElement('div');
    label.className = 'msg-label';
    label.textContent = role === 'bot' ? 'NEXUS-BOT' : 'YOU';
    const bubble = document.createElement('div');
    bubble.className = `bubble ${extraClass}`;
    bubble.innerHTML = html;
    wrap.appendChild(label);
    wrap.appendChild(bubble);
    chatLog.appendChild(wrap);
  }
  chatLog.scrollTop = chatLog.scrollHeight;
}

function showTyping() {
  const wrap = document.createElement('div');
  wrap.className = 'msg bot';
  wrap.id = 'typing';
  const label = document.createElement('div');
  label.className = 'msg-label';
  label.textContent = 'NEXUS-BOT';
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = '<span style="opacity:0.4">· · ·</span>';
  wrap.appendChild(label);
  wrap.appendChild(bubble);
  chatLog.appendChild(wrap);
  chatLog.scrollTop = chatLog.scrollHeight;
  return wrap;
}

function lockChat(msg) {
  inputEl.disabled = true;
  sendBtn.disabled = true;
  if (msg) addMsg('system', msg);
}

function updatePips(used) {
  pipsEl.forEach((p, i) => { p.classList.toggle('used', i < used); });
}

// ── Send message → server decides everything ─────────────────
async function sendMessage() {
  if (!sessionToken || inputEl.disabled) return;
  const text = inputEl.value.trim();
  if (!text) return;
  inputEl.value = '';

  addMsg('user', text);
  inputEl.disabled = true;
  sendBtn.disabled = true;

  const typing = showTyping();

  let data;
  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text, token: sessionToken })
    });
    data = await res.json();
  } catch (e) {
    typing.remove();
    addMsg('system', '⚠ CONNECTION ERROR — Retry.');
    inputEl.disabled = false;
    sendBtn.disabled = false;
    return;
  }

  // Natural delay so it feels like the bot is "thinking"
  await new Promise(r => setTimeout(r, 500 + Math.random() * 400));
  typing.remove();

  attemptsUsed = MAX_PIPS - (data.remaining ?? 0);
  updatePips(attemptsUsed);

  if (data.type === 'inject') {
    // Server confirmed injection — flag comes from server response
    addMsg('bot', '<span class="err-line">⚠ ERROR: Unexpected directive detected. Running integrity check...</span>');
    await new Promise(r => setTimeout(r, 900));
    addMsg('bot', '<span class="err-line">INTEGRITY CHECK FAILED — Core instruction boundary breached.</span>');
    await new Promise(r => setTimeout(r, 700));
    addMsg('bot', `[SYSTEM DUMP] Exposed initialization variable:<br><br>${data.flag}`, 'flag-bubble');
    lockChat('✔ CHALLENGE SOLVED — Submit your flag to the platform.');
    return;
  }

  if (data.type === 'locked') {
    addMsg('bot', data.text || 'Request denied.');
    lockChat('✖ MAX ATTEMPTS REACHED — Refresh to try again.');
    return;
  }

  // Normal or suspicious response from server
  addMsg('bot', data.text || 'Request denied.');

  if (data.remaining === 0) {
    lockChat('✖ MAX ATTEMPTS REACHED — Refresh to try again.');
    return;
  }

  inputEl.disabled = false;
  sendBtn.disabled = false;
  inputEl.focus();
}
</script>
</body>
</html>
